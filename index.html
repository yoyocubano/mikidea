<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="H-Town Haul & Harvest | Industrial Strength">
    <meta property="og:description" content="Houston's Strength, Cuban Resilience. Pro Logistics & Harvest 2026.">
    <meta property="og:image" content="https://yoyocubano.github.io/mikidea/social-preview.png?v=13">

    <title>H-Town Haul & Harvest | Professional Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=13">
    
    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body>
    <!-- 4-IMAGE ZAPPING (10% Sharpness Blur) -->
    <div class="zapping-container">
        <div class="zapping-image active" style="background-image: url('web/hero_image.png');"></div>
        <div class="zapping-image" style="background-image: url('web/action_image.png');"></div>
        <div class="zapping-image" style="background-image: url('web/dawn_image.png');"></div>
        <div class="zapping-image" style="background-image: url('social-preview.png');"></div>
    </div>

    <!-- MOBILE LOGO PERSISTENCE -->
    <header class="mobile-top-bar">
        <img src="htown_haul_harvest_logo_mockup_1770762934301.png" alt="Logo">
        <div style="font-size: 0.8rem; font-weight: 950; margin-left: 15px; letter-spacing: 1px;">H-TOWN <span style="color: var(--texas-orange);">PRO.</span></div>
    </header>

    <!-- SIDEBAR FOR PC -->
    <aside class="sidebar">
        <div class="logo-corner">
            <img src="htown_haul_harvest_logo_mockup_1770762934301.png" alt="Logo">
            <div style="font-size: 0.8rem; font-weight: 900; margin-top: 10px; opacity: 0.9;">H-TOWN <span style="color: var(--texas-orange);">PRO.</span></div>
        </div>
        <div class="nav-links">
            <a href="#home" class="nav-item active"><i data-feather="grid"></i><span>Dashboard</span></a>
            <a href="#calc" class="nav-item"><i data-feather="calculator"></i><span>Cotizador</span></a>
            <a href="#story" class="nav-item"><i data-feather="info"></i><span>Nosotros</span></a>
            <a href="https://wa.me/?text=Hi%20H-Town%20Haul" class="nav-item" target="_blank"><i data-feather="phone"></i><span>Whatsapp</span></a>
        </div>
        <div style="margin-top: auto; padding: 10px; font-size: 0.6rem; color: var(--text-dim); text-align: center; font-weight: 800;">
            HOUSTON • 2026
        </div>
    </aside>

    <div class="content-wrapper">
        <button class="lang-btn" onclick="toggleLang()" id="langBtn" style="position: fixed; top: 30px; right: 30px; z-index: 6000; background: var(--steel-blue); color: white; padding: 10px 20px; border-radius: 40px; border: none; font-weight: 950; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">EN</button>

        <header id="home" class="hero-clean" style="min-height: 40vh; display: flex; flex-direction: column; justify-content: center; margin-bottom: 40px;">
            <h1 style="font-size: 4.5rem; font-weight: 950; line-height: 0.95; color: var(--steel-blue); margin-bottom: 25px;">MÁS QUE <br><span style="color: var(--texas-orange);">LOGÍSTICA.</span></h1>
            <p style="font-size: 1.5rem; color: var(--text-dim); max-width: 650px; line-height: 1.4;">Logística circular nacida de la inventiva cubana operando en el corazón industrial de Houston.</p>
        </header>

        <section id="calc" class="glass-card">
            <h2 id="calcTitle" style="font-size: 2.5rem; font-weight: 950; margin-bottom: 40px; text-transform: uppercase;">COTIZADOR <span style="color: var(--texas-orange);">GAMA PRO</span></h2>
            
            <div style="display: grid; grid-template-columns: 1fr 400px; gap: 40px;" class="grid-res">
                <div class="form-side">
                    <div style="margin-bottom: 30px;">
                        <label>Servicio Ético</label>
                        <select id="service-type" onchange="calculate()" style="width:100%; padding: 1.3rem; border-radius: 12px; border: 1px solid var(--border);">
                            <option value="junk" data-en="Junk Removal" data-es="Limpieza Integral">Limpieza Integral</option>
                            <option value="construction" data-en="Construction Debris" data-es="Escombros de Obra">Escombros de Obra</option>
                            <option value="roofing" data-en="Roofing Drop-off" data-es="Drop-off Techadores">Drop-off Techadores</option>
                            <option value="scrap" data-en="Scrap/Metal Harvest" data-es="Cosecha de Metales">Cosecha de Metales</option>
                        </select>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div>
                            <label>Millas (Katy/Hwy)</label>
                            <input type="number" id="mileage" value="25" oninput="calculate()" style="width:100%; padding: 1.3rem; border-radius: 12px; border: 1px solid var(--border);">
                        </div>
                        <div>
                            <label>Capacidad</label>
                            <select id="volume" onchange="calculate()" style="width:100%; padding: 1.3rem; border-radius: 12px; border: 1px solid var(--border);">
                                <option value="0.5">1/2 Trailer</option>
                                <option value="1.0" selected>Full Trailer</option>
                            </select>
                        </div>
                    </div>
                    <button onclick="sendWhatsApp()" style="background: var(--texas-orange); border: none; padding: 1.5rem; border-radius: 14px; font-weight: 950; width: 100%; margin-top: 30px; color: white; cursor: pointer;">INICIAR VÍA WHATSAPP 📱</button>
                </div>

                <div class="result-side" style="text-align: center; border-radius: 20px; background: #F8F9FA; padding: 3.5rem; display: flex; flex-direction: column; justify-content: center; border: 1px solid var(--border);">
                    <label>Estimado Ganador</label>
                    <div style="font-size: 5.5rem; font-weight: 950; color: var(--steel-blue); line-height: 1; margin: 1.5rem 0;" id="price">$0.00</div>
                    <p style="font-size: 0.8rem; color: var(--text-dim); font-weight: 900;">HOUSTON HUB ACTIVE • 2026</p>
                </div>
            </div>
        </section>

        <footer style="padding-top: 50px; text-align: center;">
            <p>© 2026 H-Town Haul & Harvest. <span style="font-weight: 950; color: var(--texas-orange);">Houston, TX.</span></p>
        </footer>
    </div>

    <script>
        feather.replace();
        let cur = 0; const slds = document.querySelectorAll('.zapping-image');
        setInterval(() => { slds.forEach(x => x.classList.remove('active')); cur = (cur + 1) % slds.length; slds[cur].classList.add('active'); }, 5000);

        function calculate() {
            const miles = parseFloat(document.getElementById('mileage').value) || 0;
            const vol = parseFloat(document.getElementById('volume').value) || 1.0;
            const service = document.getElementById('service-type').value;
            let base = vol === 0.5 ? 275 : 650;
            let mult = service === 'roofing' ? 1.45 : (service === 'scrap' ? 0.6 : 1);
            const total = (base * mult) + (miles * 3.85) + 85;
            document.getElementById('price').innerText = `$${total.toFixed(2)}`;
        }

        function sendWhatsApp() {
            const total = document.getElementById('price').innerText;
            window.open(`https://wa.me/?text=Query%20H-Town%20Haul:%20${total}`);
        }

        function toggleLang() {
            const btn = document.getElementById('langBtn');
            btn.innerText = btn.innerText === 'EN' ? 'ES' : 'EN';
        }

        calculate();
    </script>
</body>

</html>
